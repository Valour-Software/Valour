# Valour node nginx config (production reference).
# The upstream "valour_backend" is defined in upstream.conf (00-upstream.conf),
# which deploy-if-new.sh rewrites on each blue/green cutover.

# Handle Upgrade headers for WebSockets by switching between
# "Upgrade" and "keep-alive" dynamically.
map $http_connection $connection_upgrade {
  "~*Upgrade" $http_connection;
  default     keep-alive;
}

server {
    # Must be >= the largest upload tier (Stargazer Pro: 250 MB)
    client_max_body_size 250M;

    listen 443 ssl http2;

    server_name app.valour.gg cdn.valour.gg api.valour.gg threads.valour.gg wiki.valour.gg;

    # Cloudflare origin certificate
    ssl_certificate     /etc/nginx/ssl/valour.crt;
    ssl_certificate_key /etc/nginx/ssl/valour.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # -----------------------
    # 1) Default location
    # -----------------------
    location / {
        proxy_pass         http://valour_backend;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }

    # -----------------------
    # 2) SignalR WebSockets
    # -----------------------
    location /hubs/core {
        proxy_pass http://valour_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache off;

        # Server-Sent Events
        proxy_buffering off;

        # If KeepAliveInterval or LongPolling is >60s, raise this
        proxy_read_timeout 100s;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP -> HTTPS redirection
server {
    listen 80;
    server_name app.valour.gg api.valour.gg threads.valour.gg wiki.valour.gg;

    location / {
        return 301 https://$host$request_uri;
    }
}
